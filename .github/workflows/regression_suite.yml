name: Regression Suite
on: 
  push:
    branches: 
      - main
  pull_request:
    branches: 
      - main
  schedule:
    - cron: '30 2 * * *'

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.13'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: run tests
        run: |
          pytest
      - name: upload report
        uses: actions/upload-artifact@v3
        with:
          name: pytest-report
          path: report.html
