name: Regression Suite
on: 
  push:
    branches: 
      - main
  pull_request:
    branches: 
      - main

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v2

      - name: Setup Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.13'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: run tests
        run: |
          python -m pytest -s --html=report.html --self-contained-html

      - name: upload report
        uses: actions/upload-artifact@v2
        with:
          name: pytest-report
          path: report.html
